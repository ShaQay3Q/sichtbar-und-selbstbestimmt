baseURL = "https://sichtbarundselbstbestimmt.org/"
locale = "de"
defaultContentLanguage = "de"
title = "Sichtbar & Selbstbestimmt"
theme = "ananke"

[permalinks]
  pages = "/:slug/"
  projects = "/:slug/"
  podcasts = "/podcasts/:slug/"

[params]
  description = "Kollektive Auseinandersetzung mit sexualisierter Gewalt"
  ShowReadingTime = false
  ShowShareButtons = false
  ShowPostNavLinks = true
  mainSections = ["posts"]

[menu]

  # [[menu.main]]
  #   name = "Aktuelles"
  #   url = "/"
  #   weight = 1

  [[menu.main]]
    name = "Wer wir sind"
    url = "/"
    weight = 1

    [[menu.main]]
    # name = "Inhalte & Beiträge"
    name = "Aktuelles"
    url = "/posts/"
    weight = 2

  [[menu.main]]
    name = "Was wir machen"
    weight = 3
    [menu.main.params]
      hasChildren = true

  [[menu.main]]
    name = "Podcasts"
    url = "/podcasts/"
    parent = "Was wir machen"
    weight = 1

  [[menu.main]]
    name = "Workshops"
    url = "/workshops/"
    parent = "Was wir machen"
    weight = 2

  [[menu.main]]
    name = "Vorträge"
    url = "/vortraege/"
    parent = "Was wir machen"
    weight = 3

  [[menu.main]]
    name = "Links"
    url = "/links/"
    weight = 4

  [[menu.main]]
    name = "Galerie"
    url = "/gallery/"
    weight = 5
    
  [[menu.main]]
    name = "Kontakt"
    url = "/kontakt/"
    weight = 6

[build]
  [build.buildStats]
    enable = true
  [[build.cachebusters]]
    source = 'assets/notwatching/hugo_stats\.json'
    target = 'css'
  [[build.cachebusters]]
    source = '(postcss|tailwind)\.config\.js'
    target = 'css'
[module]
  [[module.mounts]]
    source = 'assets'
    target = 'assets'
  [[module.mounts]]
    disableWatch = true
    source = 'hugo_stats.json'
    target = 'assets/notwatching/hugo_stats.json'