{{ define "main" }}
<div class="flex flex-row pa4 gap4" style="gap: 2rem;">

    <!-- Sidebar: quick links -->
    <aside style="min-width: 200px; max-width: 220px;">
        <h3 class="f5 fw6 ttu tracked mb3">Beiträge</h3>
        <ul class="list pl0 ma0">
            {{ range .Pages }}
            <li class="mb2">
                <a href="{{ .Permalink }}" class="link dim dark-gray f6">
                    {{ .Title }}
                </a>
            </li>
            {{ end }}
        </ul>
    </aside>

    <!-- Main: post excerpts -->
    <main style="flex: 1;">
        {{ range .Pages }}
        <article class="mb5">
            <h2 class="f4 fw6 mb1">
                <a href="{{ .Permalink }}" class="link dim dark-gray">{{ .Title }}</a>
            </h2>
            <p class="f6 gray mb2">{{ .Date.Format "02. January 2006" }}</p>
            <p class="f5 lh-copy">{{ .Summary }}</p>
            <a href="{{ .Permalink }}" class="f6 link dim dark-red">weiterlesen →</a>
        </article>
        {{ end }}
    </main>

</div>
{{ end }}
