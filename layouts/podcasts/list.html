{{ define "main" }}
<div class="page-shell">
  <header class="page-header">
    <h1 class="heading-1">Podcast</h1>
  </header>

  <div class="podcast-grid">
    {{- range .Pages }}
    <article class="podcast-list-card">
      {{- with .Params.cover }}
      <img class="podcast-cover" src="{{ . }}" alt="">
      {{- end }}

      <h2 class="heading-3">
        <a class="page-list-link" href="{{ .RelPermalink }}">{{ .Title }}</a>
      </h2>

      {{- with .Params.duration }}
      <p class="page-meta">Dauer: {{ . }}</p>
      {{- end }}

      <div class="content">{{ .Summary }}</div>
    </article>
    {{- end }}
  </div>
</div>
{{ end }}
