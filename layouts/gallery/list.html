{{ define "main" }}
<h1>Galerie</h1>

<div style="
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(200px,1fr));
  gap:1rem;
">

    {{ range .Pages }}
    <div>
        {{ with .Params.image }}
        <img src="{{ . }}" style="
          width:100%;
          border-radius:8px;
        ">
        {{ end }}
        <p>{{ .Title }}</p>
    </div>
    {{ end }}

</div>
{{ end }}
