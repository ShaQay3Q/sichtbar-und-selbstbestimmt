{{ define "main" }}
<article style="max-width: 700px; margin: auto;">
    <h1>{{ .Title }}</h1>

    {{ with .Params.audio }}
    <audio controls style="width: 100%; margin: 1rem 0;">
        <source src="{{ . }}" type="audio/mpeg">
    </audio>
    {{ end }}

    {{ .Content }}
</article>
{{ end }}
