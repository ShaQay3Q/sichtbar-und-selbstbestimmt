{{ define "main" }}
<article style="max-width: 720px; margin: auto;">

    <h1>{{ .Title }}</h1>

    {{ with .Params.audio }}
    <div style="margin: 1.5rem 0;">
        <audio controls preload="metadata" style="width: 100%;">
            <source src="{{ . }}" type="audio/mpeg">
            Your browser does not support the audio element.
        </audio>
    </div>
    {{ end }}

    {{ .Content }}

</article>
{{ end }}
